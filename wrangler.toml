name = "ricardofort-api"
main = "src/index.ts"
compatibility_date = "2024-04-03"

# Dominio personalizado
route = { pattern = "fortapi.lfnetwork.net", custom_domain = true }

# Despliegue de los archivos estáticos de la carpeta /public
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application" # Si fueramos SPA, pero aquí sirve para servir index.html
